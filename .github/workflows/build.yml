name: Build and Verification Test Workflow

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  backend-checks:
    name: Django System Check and Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: lms_db
          POSTGRES_USER: db_user
          POSTGRES_PASSWORD: db_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Django Check System
      env:
        SECRET_KEY: django-insecure-ci-check-key
        DEBUG: True
        DB_NAME: lms_db
        DB_USER: db_user
        DB_PASSWORD: db_password
        DB_HOST: 127.0.0.1
        DB_PORT: 5432
        REDIS_URL: redis://127.0.0.1:6379
      run: |
        cd backend
        python manage.py check

    - name: Verify Migrations Integrity
      env:
        SECRET_KEY: django-insecure-ci-check-key
        DEBUG: True
        DB_NAME: lms_db
        DB_USER: db_user
        DB_PASSWORD: db_password
        DB_HOST: 127.0.0.1
        DB_PORT: 5432
        REDIS_URL: redis://127.0.0.1:6379
      run: |
        cd backend
        python manage.py makemigrations --check

    - name: Run Django Tests
      env:
        SECRET_KEY: django-insecure-ci-check-key
        DEBUG: True
        DB_NAME: lms_db
        DB_USER: db_user
        DB_PASSWORD: db_password
        DB_HOST: 127.0.0.1
        DB_PORT: 5432
        REDIS_URL: redis://127.0.0.1:6379
      run: |
        cd backend
        python manage.py test

  frontend-checks:
    name: Node.js Vite Build Verification
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install dependencies
      run: |
        cd frontend
        npm install

    - name: Build frontend production bundle
      env:
        VITE_API_URL: http://127.0.0.1:8000/api/
        VITE_WS_URL: ws://127.0.0.1:8000/
      run: |
        cd frontend
        npm run build
