version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: lms_postgres
    environment:
      POSTGRES_DB: lms_db
      POSTGRES_USER: db_user
      POSTGRES_PASSWORD: db_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: lms_redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: lms_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=django-insecure-development-compose-secret-key-goes-here
      - DEBUG=True
      - DATABASE_URL=postgres://db_user:db_password@db:5432/lms_db
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis

volumes:
  pgdata:
